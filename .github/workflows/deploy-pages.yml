name: Build and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify source
        run: |
          npm run quality:size
          npm run lint
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build canonical site
        run: npm run build:vercel

      - name: Verify responsive routes and accessibility
        run: npm run qa:e2e

      - name: Verify performance budgets
        run: npm run qa:lighthouse
        env:
          CHROME_PATH: /usr/bin/google-chrome

      - name: Build GitHub Pages mirror
        run: npm run build:pages

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-qa
          path: test-results
          if-no-files-found: ignore

      - name: Add fallback and disable Jekyll
        run: |
          cp dist/app/browser/index.html dist/app/browser/404.html
          touch dist/app/browser/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/app/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
